<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <defs>
    <marker id="am" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#585b70"/>
    </marker>
  </defs>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Instalar y actualizar plugins: manual vs. lazy.nvim</text>

  <!-- Left panel: sin gestor -->
  <rect x="30" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#f38ba8" stroke-width="2"/>
  <text x="165" y="70" fill="#f38ba8" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">SIN GESTOR</text>
  <text x="50" y="96" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">1. git clone a mano</text>
  <text x="50" y="118" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">2. runtimepath manual</text>
  <text x="50" y="140" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">3. actualizar uno x uno</text>
  <text x="50" y="162" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">4. dependencias a mano</text>
  <text x="165" y="196" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Todo el mantenimiento es manual</text>

  <!-- Right panel: con gestor -->
  <rect x="340" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="475" y="70" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">CON GESTOR (lazy.nvim)</text>
  <text x="360" y="96" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">1. spec: { "user/plugin" }</text>
  <text x="360" y="118" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">2. reiniciar -&gt; instala solo</text>
  <text x="360" y="140" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">3. :Lazy update -&gt; todos</text>
  <text x="360" y="162" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">4. dependencias automáticas</text>
  <text x="475" y="196" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Declarativo — el gestor hace el resto</text>

  <line x1="300" y1="131" x2="338" y2="131" stroke="#585b70" stroke-width="1.5" marker-end="url(#am)"/>

  <text x="320" y="230" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">lazy.nvim automatiza instalación, actualización y dependencias declarando specs en Lua</text>
</svg>
