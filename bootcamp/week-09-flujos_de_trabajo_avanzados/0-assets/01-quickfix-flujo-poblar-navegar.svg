<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <defs>
    <marker id="qm1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#89b4fa"/>
    </marker>
  </defs>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Quickfix List: lista global de ubicaciones</text>

  <!-- Left panel: poblar -->
  <rect x="30" y="46" width="230" height="170" rx="8" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="145" y="70" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">POBLAR</text>
  <text x="50" y="96" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">:vimgrep /pat/gj **/*</text>
  <text x="50" y="114" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">:grep pat **/*</text>
  <text x="50" y="132" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">:make</text>
  <text x="145" y="158" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">búsqueda interna, grep</text>
  <text x="145" y="174" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">externo o compilación</text>

  <!-- Center panel: quickfix list -->
  <rect x="285" y="46" width="70" height="170" rx="8" fill="#181825" stroke="#f9e2af" stroke-width="2"/>
  <text x="320" y="70" fill="#f9e2af" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">GLOBAL</text>
  <text x="320" y="90" fill="#f9e2af" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">QUICKFIX</text>
  <text x="320" y="110" fill="#f9e2af" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">LIST</text>
  <text x="320" y="140" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10" text-anchor="middle">[1]</text>
  <text x="320" y="156" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10" text-anchor="middle">[2]</text>
  <text x="320" y="172" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10" text-anchor="middle">[3]</text>

  <!-- Right panel: navegar -->
  <rect x="380" y="46" width="230" height="170" rx="8" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="495" y="70" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">NAVEGAR</text>
  <text x="400" y="96" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">:copen / :cclose</text>
  <text x="400" y="114" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">:cnext / :cprev</text>
  <text x="400" y="132" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">]q / [q (mappings)</text>
  <text x="495" y="158" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">abrir, saltar y recorrer</text>
  <text x="495" y="174" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">cada resultado</text>

  <!-- arrows -->
  <line x1="262" y1="130" x2="283" y2="130" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#qm1)"/>
  <line x1="357" y1="130" x2="378" y2="130" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#qm1)"/>

  <text x="320" y="230" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">La quickfix list es una sola, compartida por todo Vim — cualquier fuente la puebla, cualquier comando la recorre</text>
</svg>
