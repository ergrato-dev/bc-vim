<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Resaltado de sintaxis: regex vs. Treesitter (AST)</text>

  <!-- Left panel: regex -->
  <rect x="30" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#f38ba8" stroke-width="2"/>
  <text x="165" y="70" fill="#f38ba8" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">REGEX (tradicional)</text>
  <text x="50" y="94" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10">patrón: function\s+\w+\(</text>
  <text x="50" y="120" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5">✗ no entiende contexto</text>
  <text x="50" y="140" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5">✗ no entiende anidamiento</text>
  <text x="50" y="160" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5">✗ colorea igual en todos lados</text>
  <text x="165" y="196" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Coincide texto, no significado</text>

  <!-- Right panel: treesitter -->
  <rect x="340" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="475" y="70" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">TREESITTER (AST)</text>
  <text x="360" y="94" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10">function.declaration → foo</text>
  <text x="360" y="110" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10">function.expression → bar</text>
  <text x="360" y="136" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5">✓ diferencia función de método</text>
  <text x="360" y="156" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5">✓ respeta anidamiento</text>
  <text x="360" y="176" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5">✓ coloreado semántico preciso</text>
  <text x="475" y="200" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Entiende el árbol sintáctico real</text>

  <text x="320" y="230" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Un AST habilita text objects (af, if) y folding basados en estructura, no en patrones de texto</text>
</svg>
