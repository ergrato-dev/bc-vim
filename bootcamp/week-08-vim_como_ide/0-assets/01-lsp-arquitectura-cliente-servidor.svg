<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <defs>
    <marker id="lm1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#89b4fa"/>
    </marker>
    <marker id="lm2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#a6e3a1"/>
    </marker>
  </defs>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">LSP: Neovim (cliente) ↔ Language Server (proceso externo)</text>

  <!-- Left panel: cliente -->
  <rect x="30" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="165" y="70" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">NEOVIM (cliente LSP)</text>
  <text x="50" y="96" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">gd   → go-to-definition</text>
  <text x="50" y="114" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">K    → hover</text>
  <text x="50" y="132" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">&lt;leader&gt;rn → rename</text>
  <text x="50" y="150" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">[d / ]d → diagnósticos</text>
  <text x="165" y="178" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">Muestra resultados en</text>
  <text x="165" y="194" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">el buffer, signcolumn y floats</text>

  <!-- Right panel: servidor -->
  <rect x="340" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="475" y="70" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">LANGUAGE SERVER</text>
  <text x="360" y="96" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">pyright, lua_ls, ts_ls,</text>
  <text x="360" y="112" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">rust_analyzer, gopls...</text>
  <text x="360" y="136" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5">Analiza el código:</text>
  <text x="475" y="156" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">construye AST, resuelve tipos,</text>
  <text x="475" y="172" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">detecta errores</text>
  <text x="475" y="194" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">instalado y gestionado por mason.nvim</text>

  <!-- bidirectional arrows -->
  <line x1="300" y1="118" x2="338" y2="118" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#lm1)"/>
  <line x1="338" y1="140" x2="300" y2="140" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#lm2)"/>
  <text x="320" y="112" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="9" text-anchor="middle">petición</text>
  <text x="320" y="152" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="9" text-anchor="middle">JSON-RPC</text>

  <text x="320" y="230" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">LSP desacopla el editor del análisis de lenguaje: un mismo protocolo, cualquier servidor</text>
</svg>
