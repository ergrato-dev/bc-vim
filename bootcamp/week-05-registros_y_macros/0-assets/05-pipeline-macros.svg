<svg xmlns="http://www.w3.org/2000/svg" width="640" height="230" viewBox="0 0 640 230">
  <rect width="640" height="230" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Pipeline de macros — encadena pasos pequeños en vez de una macro gigante</text>

  <!-- 4 chained boxes -->
  <rect x="20" y="60" width="130" height="80" rx="6" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="85" y="88" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700" text-anchor="middle">@a</text>
  <text x="85" y="108" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">limpiar</text>
  <text x="85" y="124" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="middle">quita espacios</text>

  <rect x="175" y="60" width="130" height="80" rx="6" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="240" y="88" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700" text-anchor="middle">@b</text>
  <text x="240" y="108" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">normalizar</text>
  <text x="240" y="124" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="middle">unifica formato</text>

  <rect x="330" y="60" width="130" height="80" rx="6" fill="#252535" stroke="#f9e2af" stroke-width="2"/>
  <text x="395" y="88" fill="#f9e2af" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700" text-anchor="middle">@c</text>
  <text x="395" y="108" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">formatear</text>
  <text x="395" y="124" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="middle">convierte a JSON</text>

  <rect x="485" y="60" width="130" height="80" rx="6" fill="#252535" stroke="#cba6f7" stroke-width="2"/>
  <text x="550" y="88" fill="#cba6f7" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700" text-anchor="middle">@d</text>
  <text x="550" y="108" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">validar</text>
  <text x="550" y="124" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="middle">verifica resultado</text>

  <!-- arrows -->
  <line x1="150" y1="100" x2="173" y2="100" stroke="#585b70" stroke-width="1.5"/>
  <polygon points="173,95 181,100 173,105" fill="#585b70"/>
  <line x1="305" y1="100" x2="328" y2="100" stroke="#585b70" stroke-width="1.5"/>
  <polygon points="328,95 336,100 328,105" fill="#585b70"/>
  <line x1="460" y1="100" x2="483" y2="100" stroke="#585b70" stroke-width="1.5"/>
  <polygon points="483,95 491,100 483,105" fill="#585b70"/>

  <text x="320" y="168" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Si un paso falla, corriges SOLO ese registro — no regrabas la cadena completa</text>
  <text x="320" y="188" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">":reg a b c d" para inspeccionar cada paso · combina con registros con nombre como plantillas</text>
</svg>
