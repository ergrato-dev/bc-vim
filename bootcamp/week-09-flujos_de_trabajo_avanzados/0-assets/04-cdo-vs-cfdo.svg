<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">:cdo vs :cfdo sobre 50 resultados en 5 archivos</text>

  <!-- Left panel: cdo -->
  <rect x="30" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#f38ba8" stroke-width="2"/>
  <text x="165" y="70" fill="#f38ba8" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">:cdo — POR ENTRADA</text>
  <text x="50" y="96" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">:cdo s/TODO/DONE/g</text>
  <text x="50" y="112" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">  | update</text>
  <text x="165" y="140" fill="#f38ba8" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700" text-anchor="middle">50 ejecuciones</text>
  <text x="165" y="160" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">una por cada resultado</text>
  <text x="165" y="176" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">útil para operaciones por línea:</text>
  <text x="165" y="192" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">norm @q, s/patrón/ (sin %)</text>

  <!-- Right panel: cfdo -->
  <rect x="340" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="475" y="70" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">:cfdo — POR ARCHIVO</text>
  <text x="360" y="96" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">:cfdo %s/TODO/DONE/g</text>
  <text x="360" y="112" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">  | update</text>
  <text x="475" y="140" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700" text-anchor="middle">5 ejecuciones</text>
  <text x="475" y="160" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">una por archivo, sin duplicados</text>
  <text x="475" y="176" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">útil para sustituciones globales</text>
  <text x="475" y="192" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">por archivo: %s/old/new/g</text>

  <text x="320" y="230" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Misma quickfix list, distinto nivel: :cdo itera resultados, :cfdo itera archivos únicos</text>
</svg>
