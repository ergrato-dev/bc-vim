<svg xmlns="http://www.w3.org/2000/svg" width="640" height="260" viewBox="0 0 640 260">
  <rect width="640" height="260" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Organización modular: lua/plugins/*.lua</text>
  <text x="90" y="50" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">~/.config/nvim/lua/plugins/</text>

  <!-- ui.lua -->
  <rect x="90" y="60" width="460" height="30" rx="5" fill="#181825" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="110" y="80" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700">ui.lua</text>
  <text x="220" y="80" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">→ temas, statusline, file tree</text>

  <!-- editing.lua -->
  <rect x="90" y="98" width="460" height="30" rx="5" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="110" y="118" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700">editing.lua</text>
  <text x="220" y="118" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">→ surround, comentarios, autopairs</text>

  <!-- lsp.lua -->
  <rect x="90" y="136" width="460" height="30" rx="5" fill="#181825" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="110" y="156" fill="#f9e2af" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700">lsp.lua</text>
  <text x="220" y="156" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">→ LSP, completion, linting</text>

  <!-- git.lua -->
  <rect x="90" y="174" width="460" height="30" rx="5" fill="#181825" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="110" y="194" fill="#cba6f7" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700">git.lua</text>
  <text x="220" y="194" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">→ gitsigns, fugitive</text>

  <!-- tools.lua -->
  <rect x="90" y="212" width="460" height="30" rx="5" fill="#181825" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="110" y="232" fill="#f38ba8" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700">tools.lua</text>
  <text x="220" y="232" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">→ telescope, which-key, terminal</text>

  <text x="320" y="256" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">Cada archivo = una responsabilidad clara; renombrar a .lua.disabled desactiva toda la categoría</text>
</svg>
