<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">:s alcanza 1 línea — :%s alcanza TODO el archivo</text>

  <!-- :s row -->
  <rect x="15" y="42" width="610" height="82" rx="5" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="30" y="64" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700">:s/foo/bar/g</text>

  <text x="30" y="88" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">foo uno</text>
  <rect x="27" y="96" width="80" height="18" fill="#89b4fa" opacity="0.25" rx="2"/>
  <text x="30" y="110" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">foo dos    ← línea actual (única afectada)</text>
  <text x="30" y="132" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">foo tres</text>
  <text x="320" y="110" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">solo la línea donde está el cursor</text>

  <!-- :%s row -->
  <rect x="15" y="132" width="610" height="96" rx="5" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="30" y="154" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700">:%s/foo/bar/g</text>

  <rect x="27" y="164" width="80" height="18" fill="#a6e3a1" opacity="0.22" rx="2"/>
  <text x="30" y="178" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">foo uno</text>
  <rect x="27" y="186" width="80" height="18" fill="#a6e3a1" opacity="0.22" rx="2"/>
  <text x="30" y="200" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">foo dos</text>
  <rect x="27" y="208" width="80" height="18" fill="#a6e3a1" opacity="0.22" rx="2"/>
  <text x="30" y="222" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">foo tres</text>
  <text x="320" y="198" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">% = rango 1,$ → TODAS las líneas</text>

  <text x="320" y="236" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">el flag /g adicional controla ocurrencias POR LÍNEA, no el alcance</text>
</svg>
