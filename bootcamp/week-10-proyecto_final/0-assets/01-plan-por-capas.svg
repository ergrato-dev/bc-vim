<svg xmlns="http://www.w3.org/2000/svg" width="640" height="300" viewBox="0 0 640 300">
  <rect width="640" height="300" fill="#1e1e2e"/>

  <defs>
    <marker id="pm" markerWidth="8" markerHeight="8" refX="4" refY="0" orient="auto">
      <polygon points="0 8,4 0,8 8" fill="#585b70"/>
    </marker>
  </defs>

  <text x="320" y="24" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Plan de Implementación por Capas — Proyecto Final</text>

  <!-- vertical build arrow -->
  <line x1="22" y1="258" x2="22" y2="60" stroke="#585b70" stroke-width="1.5" marker-end="url(#pm)"/>

  <!-- CAPA 7 (top, final) -->
  <rect x="40" y="42" width="560" height="26" rx="4" fill="#252535" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="52" y="59" fill="#f38ba8" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" font-weight="700">CAPA 7 · Documentación</text>
  <text x="588" y="59" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="end">README, screenshots — 1.5h</text>

  <!-- CAPA 6 -->
  <rect x="40" y="72" width="560" height="26" rx="4" fill="#252535" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="52" y="89" fill="#cba6f7" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" font-weight="700">CAPA 6 · Avanzado</text>
  <text x="588" y="89" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="end">DAP, autocmds, snippets — 1h</text>

  <!-- CAPA 5 -->
  <rect x="40" y="102" width="560" height="26" rx="4" fill="#252535" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="52" y="119" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" font-weight="700">CAPA 5 · IDE</text>
  <text x="588" y="119" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="end">LSP, cmp, mason — 1h</text>

  <!-- CAPA 4 -->
  <rect x="40" y="132" width="560" height="26" rx="4" fill="#252535" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="52" y="149" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" font-weight="700">CAPA 4 · Edición</text>
  <text x="588" y="149" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="end">comment, surround, git — 30 min</text>

  <!-- CAPA 3 -->
  <rect x="40" y="162" width="560" height="26" rx="4" fill="#252535" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="52" y="179" fill="#f9e2af" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" font-weight="700">CAPA 3 · Navegación</text>
  <text x="588" y="179" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="end">keymaps, telescope — 30 min</text>

  <!-- CAPA 2 -->
  <rect x="40" y="192" width="560" height="26" rx="4" fill="#252535" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="52" y="209" fill="#cba6f7" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" font-weight="700">CAPA 2 · UI</text>
  <text x="588" y="209" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="end">tema, statusline, file tree — 30 min</text>

  <!-- CAPA 1 (base, bottom) -->
  <rect x="40" y="222" width="560" height="26" rx="4" fill="#252535" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="52" y="239" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" font-weight="700">CAPA 1 · Base</text>
  <text x="588" y="239" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="end">init.lua, options — 30 min</text>

  <text x="320" y="280" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">Cada capa se verifica funcional antes de pasar a la siguiente</text>
  <text x="320" y="294" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">— de la base (init.lua) hasta la documentación publicable</text>
</svg>
