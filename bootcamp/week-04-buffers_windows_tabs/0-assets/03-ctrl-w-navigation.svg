<svg xmlns="http://www.w3.org/2000/svg" width="640" height="260" viewBox="0 0 640 260">
  <rect width="640" height="260" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Ctrl-w + hjkl — navegación direccional entre ventanas</text>

  <!-- 2x2 grid -->
  <rect x="150" y="46" width="240" height="180" rx="4" fill="#181825" stroke="#313244" stroke-width="1"/>
  <rect x="150" y="46" width="120" height="90" fill="#252535" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="210" y="94" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Ventana 1</text>

  <rect x="270" y="46" width="120" height="90" fill="#252535" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="330" y="94" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Ventana 2</text>

  <rect x="150" y="136" width="120" height="90" fill="#252535" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="210" y="184" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Ventana 3</text>

  <rect x="270" y="136" width="120" height="90" fill="#252535" stroke="#f9e2af" stroke-width="2.5"/>
  <text x="330" y="184" fill="#f9e2af" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Ventana 4 (cursor)</text>

  <!-- direction labels from window 4 -->
  <text x="450" y="90" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">Ctrl-w k ↑  → Ventana 2</text>
  <text x="450" y="170" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">Ctrl-w h ←  → Ventana 3</text>
  <text x="20" y="90" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">Ctrl-w t → top-left (V1)</text>
  <text x="20" y="170" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">Ctrl-w b → bottom-right (V4)</text>

  <text x="320" y="248" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Ctrl-w w → siguiente ventana en orden  ·  Ctrl-w p → ventana anterior</text>
</svg>
