<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Fuzzy Finder vs. File Tree — dos formas de navegar</text>

  <!-- Left panel: telescope -->
  <rect x="30" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="165" y="70" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">TELESCOPE (fuzzy finder)</text>
  <text x="165" y="92" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">Conoces el nombre</text>
  <text x="50" y="118" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">&lt;leader&gt;ff</text>
  <text x="50" y="140" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">escribe "init"</text>
  <text x="50" y="162" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">Enter -&gt; salta al archivo</text>
  <text x="165" y="196" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Velocidad: instantáneo si sabes qué buscas</text>

  <!-- Right panel: neo-tree -->
  <rect x="340" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="475" y="70" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">NEO-TREE (file tree)</text>
  <text x="475" y="92" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">No sabes qué hay</text>
  <text x="360" y="118" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">&lt;leader&gt;e</text>
  <text x="360" y="140" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">navega con hjkl</text>
  <text x="360" y="162" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">Enter -&gt; abre archivo/carpeta</text>
  <text x="475" y="196" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Visual: explorar estructura de directorios</text>

  <text x="320" y="230" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Regla: si sabes el nombre → fuzzy finder. Si no sabes qué hay → file tree.</text>
</svg>
