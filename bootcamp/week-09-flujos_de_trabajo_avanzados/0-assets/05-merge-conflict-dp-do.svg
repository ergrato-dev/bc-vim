<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <defs>
    <marker id="fm" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#585b70"/>
    </marker>
  </defs>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Resolver merge conflicts: diff de 3 vías con fugitive</text>

  <!-- Left panel: dp -->
  <rect x="30" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="165" y="70" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700" text-anchor="middle">dp — diff put</text>
  <text x="165" y="96" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">Envía TU cambio</text>
  <text x="165" y="112" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">al otro lado del diff</text>
  <text x="165" y="140" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Usa esto cuando tu versión</text>
  <text x="165" y="156" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">(rama actual) es la correcta</text>
  <text x="165" y="184" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10" text-anchor="middle">]c / [c → navegar conflictos</text>

  <!-- Right panel: do -->
  <rect x="340" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#f9e2af" stroke-width="2"/>
  <text x="475" y="70" fill="#f9e2af" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700" text-anchor="middle">do — diff obtain</text>
  <text x="475" y="96" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">Trae el cambio DEL</text>
  <text x="475" y="112" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">otro lado del diff</text>
  <text x="475" y="140" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Usa esto cuando la versión</text>
  <text x="475" y="156" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">entrante (merge) es la correcta</text>
  <text x="475" y="184" fill="#f9e2af" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10" text-anchor="middle">:Gwrite → marcar resuelto</text>

  <line x1="300" y1="130" x2="338" y2="130" stroke="#585b70" stroke-width="1.5" marker-end="url(#fm)"/>

  <text x="320" y="230" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Regla mnemotécnica: dp = "put" (empujo mi cambio), do = "obtain" (traigo el ajeno)</text>
</svg>
