<svg xmlns="http://www.w3.org/2000/svg" width="640" height="260" viewBox="0 0 640 260">
  <rect width="640" height="260" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Buffer (archivo en memoria) vs Ventana (viewport)</text>

  <!-- Window box -->
  <rect x="30" y="46" width="290" height="130" rx="6" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="175" y="66" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">VENTANA 1 (viewport)</text>
  <rect x="45" y="76" width="260" height="85" rx="4" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="60" y="98" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">function main() {</text>
  <text x="60" y="116" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">  init();</text>
  <text x="60" y="134" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">}</text>
  <text x="175" y="153" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">muestra el buffer archivo.js</text>

  <!-- arrow -->
  <line x1="320" y1="111" x2="360" y2="111" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="340" y="103" fill="#f9e2af" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">ve</text>

  <!-- Buffers list -->
  <rect x="365" y="46" width="245" height="176" rx="6" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="487" y="66" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">BUFFERS EN MEMORIA</text>

  <rect x="380" y="76" width="215" height="26" rx="3" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="390" y="93" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">1  archivo.js</text>
  <text x="590" y="93" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="end">visible</text>

  <rect x="380" y="107" width="215" height="26" rx="3" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="390" y="124" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">2  estilo.css</text>
  <text x="590" y="124" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="end">oculto (h)</text>

  <rect x="380" y="138" width="215" height="26" rx="3" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="390" y="155" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">3  README.md</text>
  <text x="590" y="155" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="end">oculto (h)</text>

  <rect x="380" y="169" width="215" height="26" rx="3" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="390" y="186" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">4  utils.lua</text>
  <text x="590" y="186" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="end">oculto (a)</text>

  <text x="320" y="240" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">un buffer puede existir SIN ser visible — una ventana es solo una vista de un buffer</text>

  <defs>
    <marker id="a1" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0,7 3,0 6" fill="#f9e2af"/>
    </marker>
  </defs>
</svg>
