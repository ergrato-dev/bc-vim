<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Por qué Lua: mismo objetivo, lenguaje real</text>

  <!-- Left panel: Vimscript -->
  <rect x="30" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#f38ba8" stroke-width="2"/>
  <text x="165" y="70" fill="#f38ba8" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">VIMSCRIPT</text>
  <text x="50" y="94" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">let g:mapleader = " "</text>
  <text x="50" y="112" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">set number relativenumber</text>
  <text x="50" y="130" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">nnoremap &lt;leader&gt;w :w&lt;CR&gt;</text>
  <text x="50" y="156" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5">Lenguaje de scripting propio</text>
  <text x="50" y="174" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5">Sin módulos ni tipos reales</text>
  <text x="165" y="200" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Sintaxis heredada de Vim clásico</text>

  <!-- Right panel: Lua -->
  <rect x="340" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="475" y="70" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">LUA</text>
  <text x="360" y="94" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">vim.g.mapleader = " "</text>
  <text x="360" y="112" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">vim.opt.number = true</text>
  <text x="360" y="130" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">vim.keymap.set("n", "&lt;leader&gt;w", ...)</text>
  <text x="360" y="156" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5">Lenguaje real: funciones, módulos</text>
  <text x="360" y="174" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5">Más rápido, ecosistema Lua-first</text>
  <text x="475" y="200" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Lenguaje de configuración de primera clase (Neovim 0.5+)</text>

  <text x="320" y="230" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Mismo resultado, distinta expresividad — por eso el ecosistema migró a Lua</text>
</svg>
