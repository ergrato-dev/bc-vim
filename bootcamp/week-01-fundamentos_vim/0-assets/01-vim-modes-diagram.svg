<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400">
  <rect width="760" height="400" fill="#1e1e2e"/>

  <defs>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#a6e3a1"/>
    </marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#89b4fa"/>
    </marker>
    <marker id="ap" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#cba6f7"/>
    </marker>
    <marker id="ay" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f9e2af"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="380" y="43" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="17" font-weight="600" text-anchor="middle">Modos de Vim — Diagrama de Transiciones</text>
  <text x="380" y="66" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" text-anchor="middle">Esc siempre regresa a NORMAL desde cualquier modo</text>

  <!-- NORMAL: center(380,192), box x=295 y=157 w=170 h=70 -->
  <rect x="295" y="157" width="170" height="70" rx="8" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="380" y="186" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" text-anchor="middle">NORMAL</text>
  <text x="380" y="207" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">navegar · ejecutar</text>

  <!-- INSERT: center(615,192), box x=530 y=157 w=170 h=70 -->
  <rect x="530" y="157" width="170" height="70" rx="8" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="615" y="186" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" text-anchor="middle">INSERT</text>
  <text x="615" y="207" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">escribir texto</text>

  <!-- VISUAL: center(145,192), box x=60 y=157 w=170 h=70 -->
  <rect x="60" y="157" width="170" height="70" rx="8" fill="#252535" stroke="#cba6f7" stroke-width="2"/>
  <text x="145" y="186" fill="#cba6f7" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" text-anchor="middle">VISUAL</text>
  <text x="145" y="207" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">seleccionar texto</text>

  <!-- COMMAND: center(380,320), box x=295 y=285 w=170 h=70 -->
  <rect x="295" y="285" width="170" height="70" rx="8" fill="#252535" stroke="#f9e2af" stroke-width="2"/>
  <text x="380" y="314" fill="#f9e2af" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" text-anchor="middle">COMMAND</text>
  <text x="380" y="335" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">ejecutar :comandos</text>

  <!-- NORMAL → INSERT (upper y=178) -->
  <line x1="465" y1="178" x2="528" y2="178" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="497" y="170" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">i  a  o  I  A  O</text>

  <!-- INSERT → NORMAL (lower y=205) -->
  <line x1="530" y1="205" x2="467" y2="205" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="498" y="221" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">Esc</text>

  <!-- VISUAL → NORMAL (upper y=178) -->
  <line x1="230" y1="178" x2="293" y2="178" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="262" y="170" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">Esc</text>

  <!-- NORMAL → VISUAL (lower y=205) -->
  <line x1="295" y1="205" x2="232" y2="205" stroke="#cba6f7" stroke-width="1.5" marker-end="url(#ap)"/>
  <text x="263" y="221" fill="#cba6f7" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">v  V  Ctrl-v</text>

  <!-- NORMAL → COMMAND (right x=393) -->
  <line x1="393" y1="227" x2="393" y2="283" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#ay)"/>
  <text x="407" y="260" fill="#f9e2af" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" text-anchor="start">:</text>

  <!-- COMMAND → NORMAL (left x=368) -->
  <line x1="368" y1="285" x2="368" y2="229" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="280" y="260" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">Enter / Esc</text>
</svg>
