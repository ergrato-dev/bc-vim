<svg xmlns="http://www.w3.org/2000/svg" width="620" height="250" viewBox="0 0 620 250">
  <rect width="620" height="250" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="310" y="36" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="16" font-weight="600" text-anchor="middle">word vs WORD — límites de palabra</text>

  <!-- ─── Section: word (w) ─── -->
  <!-- Label -->
  <rect x="18" y="56" width="76" height="22" rx="4" fill="#252535" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="56" y="72" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" text-anchor="middle">word  (w)</text>
  <text x="105" y="72" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">se detiene en puntuación y símbolos</text>

  <!-- Text: hello.world foo, monospace 22px, x_start=135 -->
  <!-- char width ~13.2px: h=135, e=148, l=161, l=174, o=187, .=200, w=213, o=226, r=239, l=252, d=265, (sp)=278, f=291, o=304, o=317 -->
  <text x="135" y="105" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="22">hello.world foo</text>

  <!-- word (w) boundary markers at: h(135), .(200), w(213), f(291) -->
  <!-- Vertical tick lines below text -->
  <line x1="136" y1="110" x2="136" y2="125" stroke="#89b4fa" stroke-width="2"/>
  <line x1="201" y1="110" x2="201" y2="125" stroke="#89b4fa" stroke-width="2"/>
  <line x1="214" y1="110" x2="214" y2="125" stroke="#89b4fa" stroke-width="2"/>
  <line x1="291" y1="110" x2="291" y2="125" stroke="#89b4fa" stroke-width="2"/>
  <!-- Dots at tick tops -->
  <circle cx="136" cy="110" r="3" fill="#89b4fa"/>
  <circle cx="201" cy="110" r="3" fill="#89b4fa"/>
  <circle cx="214" cy="110" r="3" fill="#89b4fa"/>
  <circle cx="291" cy="110" r="3" fill="#89b4fa"/>
  <!-- Count label -->
  <text x="445" y="122" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="start">4 paradas</text>

  <!-- Divider -->
  <line x1="18" y1="142" x2="602" y2="142" stroke="#313244" stroke-width="1"/>

  <!-- ─── Section: WORD (W) ─── -->
  <rect x="18" y="152" width="76" height="22" rx="4" fill="#252535" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="56" y="168" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" text-anchor="middle">WORD (W)</text>
  <text x="105" y="168" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">se detiene solo en espacios</text>

  <!-- Same text -->
  <text x="135" y="201" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="22">hello.world foo</text>

  <!-- WORD (W) boundaries: h(135), f(291) only -->
  <line x1="136" y1="206" x2="136" y2="221" stroke="#a6e3a1" stroke-width="2"/>
  <line x1="291" y1="206" x2="291" y2="221" stroke="#a6e3a1" stroke-width="2"/>
  <circle cx="136" cy="206" r="3" fill="#a6e3a1"/>
  <circle cx="291" cy="206" r="3" fill="#a6e3a1"/>
  <text x="445" y="218" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="start">2 paradas</text>

  <!-- Bottom note -->
  <text x="310" y="243" fill="#45475a" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">w/b/e usan word — W/B/E usan WORD</text>
</svg>
