<svg xmlns="http://www.w3.org/2000/svg" width="640" height="260" viewBox="0 0 640 260">
  <rect width="640" height="260" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">:split (horizontal) vs :vsplit (vertical)</text>

  <!-- :split -->
  <text x="155" y="52" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700" text-anchor="middle">:split</text>
  <rect x="30" y="60" width="250" height="150" rx="6" fill="#181825" stroke="#313244" stroke-width="1"/>
  <rect x="30" y="60" width="250" height="73" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="155" y="100" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Ventana 1 (arriba)</text>
  <rect x="30" y="137" width="250" height="73" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="155" y="177" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Ventana 2 (abajo)</text>
  <text x="155" y="228" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">divide el ESPACIO HORIZONTALMENTE</text>

  <!-- :vsplit -->
  <text x="485" y="52" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700" text-anchor="middle">:vsplit</text>
  <rect x="360" y="60" width="250" height="150" rx="6" fill="#181825" stroke="#313244" stroke-width="1"/>
  <rect x="360" y="60" width="123" height="150" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="421" y="139" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Ventana 1</text>
  <text x="421" y="154" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">(izquierda)</text>
  <rect x="487" y="60" width="123" height="150" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="548" y="139" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Ventana 2</text>
  <text x="548" y="154" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">(derecha)</text>
  <text x="485" y="228" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">divide el ESPACIO VERTICALMENTE</text>

  <text x="320" y="250" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">ambas pueden mostrar el mismo buffer o buffers distintos</text>
</svg>
