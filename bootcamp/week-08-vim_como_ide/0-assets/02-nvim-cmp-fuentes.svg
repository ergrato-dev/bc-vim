<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <defs>
    <marker id="cm" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#585b70"/>
    </marker>
  </defs>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">nvim-cmp: un motor, múltiples fuentes de sugerencias</text>

  <!-- Center hub -->
  <rect x="245" y="98" width="150" height="50" rx="8" fill="#181825" stroke="#f9e2af" stroke-width="2"/>
  <text x="320" y="129" fill="#f9e2af" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700" text-anchor="middle">nvim-cmp</text>

  <!-- Source boxes -->
  <rect x="30" y="45" width="150" height="46" rx="6" fill="#252535" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="105" y="64" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" font-weight="700" text-anchor="middle">nvim_lsp</text>
  <text x="105" y="80" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="middle">símbolos del servidor LSP</text>

  <rect x="460" y="45" width="150" height="46" rx="6" fill="#252535" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="535" y="64" fill="#cba6f7" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" font-weight="700" text-anchor="middle">luasnip</text>
  <text x="535" y="80" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="middle">snippets con tabstops</text>

  <rect x="30" y="164" width="150" height="46" rx="6" fill="#252535" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="105" y="183" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" font-weight="700" text-anchor="middle">buffer</text>
  <text x="105" y="199" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="middle">palabras ya escritas</text>

  <rect x="460" y="164" width="150" height="46" rx="6" fill="#252535" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="535" y="183" fill="#f38ba8" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" font-weight="700" text-anchor="middle">path</text>
  <text x="535" y="199" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="middle">rutas de archivo</text>

  <!-- connecting lines -->
  <line x1="180" y1="68" x2="243" y2="105" stroke="#585b70" stroke-width="1.3" marker-end="url(#cm)"/>
  <line x1="460" y1="68" x2="397" y2="105" stroke="#585b70" stroke-width="1.3" marker-end="url(#cm)"/>
  <line x1="180" y1="187" x2="243" y2="140" stroke="#585b70" stroke-width="1.3" marker-end="url(#cm)"/>
  <line x1="460" y1="187" x2="397" y2="140" stroke="#585b70" stroke-width="1.3" marker-end="url(#cm)"/>

  <text x="320" y="230" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">La primera fuente que devuelve resultados, según el orden configurado, gana</text>
</svg>
