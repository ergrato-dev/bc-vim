<svg xmlns="http://www.w3.org/2000/svg" width="680" height="310" viewBox="0 0 680 310">
  <rect width="680" height="310" fill="#1e1e2e"/>

  <text x="340" y="28" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Vim como Lenguaje: {verbo} [cantidad] {sustantivo}</text>

  <!-- Formula boxes -->
  <!-- Verb box -->
  <rect x="30" y="44" width="140" height="60" rx="6" fill="#313244" stroke="#f38ba8" stroke-width="2"/>
  <text x="100" y="70" fill="#f38ba8" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">VERBO</text>
  <text x="100" y="88" fill="#f38ba8" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" text-anchor="middle">d  c  y  &gt;  =  gu</text>

  <!-- + sign -->
  <text x="185" y="79" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" text-anchor="middle">+</text>

  <!-- Count box (optional) -->
  <rect x="200" y="44" width="120" height="60" rx="6" fill="#181825" stroke="#585b70" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="260" y="70" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">CANTIDAD</text>
  <text x="260" y="88" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" text-anchor="middle">2  3  10  …</text>

  <!-- + sign -->
  <text x="335" y="79" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" text-anchor="middle">+</text>

  <!-- Noun box -->
  <rect x="350" y="44" width="155" height="60" rx="6" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <text x="427" y="70" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">SUSTANTIVO</text>
  <text x="427" y="88" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" text-anchor="middle">w  iw  i"  i{  f:  /pat</text>

  <!-- = sign -->
  <text x="520" y="79" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" text-anchor="middle">=</text>

  <!-- Action box -->
  <rect x="535" y="44" width="130" height="60" rx="6" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
  <text x="600" y="70" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">ACCIÓN</text>
  <text x="600" y="88" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">edición precisa</text>

  <!-- Optional label -->
  <text x="260" y="116" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">(opcional)</text>

  <!-- Examples table -->
  <line x1="30" y1="128" x2="650" y2="128" stroke="#313244" stroke-width="1"/>
  <text x="30" y="144" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12">Ejemplos:</text>

  <!-- Example rows: y positions 160, 185, 210, 235, 260, 285 -->
  <!-- Header -->
  <text x="50"  y="160" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">Frase</text>
  <text x="320" y="160" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">Significado</text>

  <!-- Row 1 -->
  <text x="50"  y="180" fill="#f38ba8" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">d</text>
  <text x="65"  y="180" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">  3  </text>
  <text x="105" y="180" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">w</text>
  <text x="320" y="180" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12">delete 3 words</text>

  <!-- Row 2 -->
  <text x="50"  y="202" fill="#f38ba8" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">c</text>
  <text x="65"  y="202" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">  —  </text>
  <text x="105" y="202" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">i"</text>
  <text x="320" y="202" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12">change inside quotes</text>

  <!-- Row 3 -->
  <text x="50"  y="224" fill="#f38ba8" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">y</text>
  <text x="65"  y="224" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">  —  </text>
  <text x="105" y="224" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">a{</text>
  <text x="320" y="224" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12">yank around braces (con llaves)</text>

  <!-- Row 4 -->
  <text x="50"  y="246" fill="#f38ba8" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">&gt;</text>
  <text x="65"  y="246" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">  2  </text>
  <text x="105" y="246" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">j</text>
  <text x="320" y="246" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12">indentar 2 líneas hacia abajo</text>

  <!-- Row 5 -->
  <text x="50"  y="268" fill="#f38ba8" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">gu</text>
  <text x="73"  y="268" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">  —  </text>
  <text x="113" y="268" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">iw</text>
  <text x="320" y="268" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12">lowercase inner word</text>

  <!-- Row 6 -->
  <text x="50"  y="290" fill="#f38ba8" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">d</text>
  <text x="65"  y="290" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">  —  </text>
  <text x="105" y="290" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">f:</text>
  <text x="320" y="290" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12">delete hasta ':' (inclusive)</text>

  <!-- dot repeat note -->
  <text x="650" y="290" fill="#f9e2af" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" text-anchor="end">. repite el último cambio</text>
</svg>
