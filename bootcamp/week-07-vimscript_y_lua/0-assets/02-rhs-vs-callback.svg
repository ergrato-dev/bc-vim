<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">vim.keymap.set(): rhs (string) vs callback (función)</text>

  <!-- Left panel: rhs -->
  <rect x="30" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="165" y="70" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">rhs (string) — CONCISA</text>
  <text x="50" y="98" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">vim.keymap.set("n",</text>
  <text x="50" y="114" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">  "&lt;leader&gt;s",</text>
  <text x="50" y="130" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">  "&lt;cmd&gt;w&lt;CR&gt;")</text>
  <text x="50" y="156" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5">Comando simple, una acción</text>
  <text x="50" y="174" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5">Ejecuta un comando Ex directo</text>
  <text x="165" y="200" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Ideal para mappings de una sola línea</text>

  <!-- Right panel: callback -->
  <rect x="340" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#cba6f7" stroke-width="2"/>
  <text x="475" y="70" fill="#cba6f7" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">callback (función) — POTENTE</text>
  <text x="360" y="94" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">vim.keymap.set("n", "&lt;leader&gt;s",</text>
  <text x="360" y="110" fill="#cba6f7" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">  function()</text>
  <text x="360" y="126" fill="#cba6f7" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">    vim.cmd("write")</text>
  <text x="360" y="142" fill="#cba6f7" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">    vim.notify("Guardado")</text>
  <text x="360" y="158" fill="#cba6f7" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">  end)</text>
  <text x="475" y="180" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">Lógica múltiple, condiciones, cálculos</text>
  <text x="475" y="200" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Ideal cuando el mapping necesita decidir algo</text>

  <text x="320" y="230" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Regla práctica: string para una acción directa, función cuando hay lógica detrás</text>
</svg>
