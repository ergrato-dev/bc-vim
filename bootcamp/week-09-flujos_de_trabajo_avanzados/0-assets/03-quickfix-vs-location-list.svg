<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Quickfix (global) vs Location List (por ventana)</text>

  <!-- Left panel: quickfix -->
  <rect x="30" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="165" y="70" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">QUICKFIX — GLOBAL</text>
  <text x="50" y="96" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">:vimgrep / :grep / :make</text>
  <text x="50" y="114" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">:copen  :cnext  :cprev</text>
  <text x="165" y="140" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">Una sola lista compartida</text>
  <text x="165" y="156" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">por todo Vim</text>
  <text x="165" y="180" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Ideal: errores de compilación,</text>
  <text x="165" y="196" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">búsquedas globales de proyecto</text>

  <!-- Right panel: location list -->
  <rect x="340" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="475" y="70" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">LOCATION — POR VENTANA</text>
  <text x="360" y="96" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">:lvimgrep / :lgrep / :lmake</text>
  <text x="360" y="114" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">:lopen  :lnext  :lprev</text>
  <text x="475" y="140" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">Una lista independiente</text>
  <text x="475" y="156" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">por cada ventana</text>
  <text x="475" y="180" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Ideal: búsquedas en un archivo,</text>
  <text x="475" y="196" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">diagnósticos LSP por ventana</text>

  <text x="320" y="230" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Mismos comandos, distinto alcance: prefijo "l" = local a la ventana en la que se ejecuta</text>
</svg>
