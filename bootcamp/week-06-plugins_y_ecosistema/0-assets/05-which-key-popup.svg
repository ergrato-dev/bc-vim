<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">which-key.nvim: descubrir mappings al presionar &lt;leader&gt;</text>

  <!-- Left panel: sin which-key -->
  <rect x="30" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#f38ba8" stroke-width="2"/>
  <text x="165" y="70" fill="#f38ba8" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">SIN which-key</text>
  <text x="50" y="98" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">&lt;leader&gt; + ???</text>
  <text x="50" y="124" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">Adivinar o revisar el código</text>
  <text x="50" y="146" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">Memorizar todos los mappings</text>
  <text x="165" y="196" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Sin pistas visuales</text>

  <!-- Right panel: con which-key -->
  <rect x="340" y="46" width="270" height="170" rx="8" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="475" y="70" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">CON which-key</text>
  <text x="360" y="94" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">&lt;leader&gt; → espera 500ms</text>
  <rect x="360" y="104" width="230" height="72" rx="4" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="374" y="120" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">f → Find / Telescope</text>
  <text x="374" y="136" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">g → Git</text>
  <text x="374" y="152" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">b → Buffers</text>
  <text x="374" y="168" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5">w → Window …</text>
  <text x="475" y="196" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Popup organizado por grupos</text>

  <text x="320" y="230" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">which-key convierte cualquier prefijo en un menú descubrible — no necesitas memorizarlo todo</text>
</svg>
