<svg xmlns="http://www.w3.org/2000/svg" width="640" height="220" viewBox="0 0 640 220">
  <rect width="640" height="220" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">! (filter) — el texto PASA por un comando externo y VUELVE reemplazado</text>

  <!-- box 1: text in -->
  <rect x="15" y="50" width="175" height="90" rx="6" fill="#181825" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="102" y="72" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">texto en el buffer</text>
  <text x="30" y="94" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">zeta</text>
  <text x="30" y="110" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">alfa</text>
  <text x="30" y="126" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">gamma</text>

  <!-- arrow 1 -->
  <line x1="192" y1="95" x2="230" y2="95" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#af)"/>
  <text x="211" y="85" fill="#f9e2af" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" text-anchor="middle">!Gsort</text>

  <!-- box 2: shell command -->
  <rect x="232" y="50" width="175" height="90" rx="6" fill="#181825" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="319" y="72" fill="#f9e2af" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">comando externo</text>
  <text x="248" y="98" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">$ sort</text>
  <text x="248" y="120" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10">(recibe stdin, produce stdout)</text>

  <!-- arrow 2 -->
  <line x1="409" y1="95" x2="447" y2="95" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="428" y="85" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">reemplaza</text>

  <!-- box 3: text out -->
  <rect x="449" y="50" width="175" height="90" rx="6" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="536" y="72" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">buffer actualizado</text>
  <text x="464" y="94" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">alfa</text>
  <text x="464" y="110" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">gamma</text>
  <text x="464" y="126" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">zeta</text>

  <text x="320" y="168" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">!{motion}{cmd} filtra un rango puntual  ·  :%!{cmd} filtra TODO el archivo</text>
  <text x="320" y="190" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">otros filtros comunes: column -t · python3 -m json.tool · uniq</text>

  <defs>
    <marker id="af" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0,7 3,0 6" fill="#f9e2af"/>
    </marker>
    <marker id="ag" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0,7 3,0 6" fill="#a6e3a1"/>
    </marker>
  </defs>
</svg>
