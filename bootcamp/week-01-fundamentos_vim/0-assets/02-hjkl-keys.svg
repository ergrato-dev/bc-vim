<svg xmlns="http://www.w3.org/2000/svg" width="400" height="355" viewBox="0 0 400 355">
  <rect width="400" height="355" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="200" y="36" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="16" font-weight="600" text-anchor="middle">Movimiento hjkl</text>
  <text x="200" y="56" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">sin mover la mano de la fila home</text>

  <!-- Arrow UP above k -->
  <polygon points="200,66 191,80 209,80" fill="#89b4fa"/>

  <!-- Key k: x=160 y=83 w=80 h=68 -->
  <rect x="160" y="83" width="80" height="68" rx="8" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="200" y="121" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="32" font-weight="600" text-anchor="middle">k</text>
  <text x="200" y="141" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">arriba</text>

  <!-- Arrow LEFT of h -->
  <polygon points="44,195 58,187 58,203" fill="#89b4fa"/>

  <!-- Key h: x=65 y=163 w=80 h=68 -->
  <rect x="65" y="163" width="80" height="68" rx="8" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="105" y="201" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="32" font-weight="600" text-anchor="middle">h</text>
  <text x="105" y="221" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">izquierda</text>

  <!-- Key l: x=255 y=163 w=80 h=68 -->
  <rect x="255" y="163" width="80" height="68" rx="8" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="295" y="201" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="32" font-weight="600" text-anchor="middle">l</text>
  <text x="295" y="221" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">derecha</text>

  <!-- Arrow RIGHT of l -->
  <polygon points="356,195 342,187 342,203" fill="#89b4fa"/>

  <!-- Key j: x=160 y=243 w=80 h=68 -->
  <rect x="160" y="243" width="80" height="68" rx="8" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="200" y="281" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="32" font-weight="600" text-anchor="middle">j</text>
  <text x="200" y="301" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">abajo</text>

  <!-- Arrow DOWN below j -->
  <polygon points="200,322 191,311 209,311" fill="#89b4fa"/>

  <!-- Footer note -->
  <text x="200" y="345" fill="#45475a" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">Las flechas del teclado también funcionan, pero mueven la mano de posición</text>
</svg>
