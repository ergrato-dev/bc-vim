<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <defs>
    <marker id="ar1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#585b70"/>
    </marker>
  </defs>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Un autocomando: reacción automática a un evento</text>

  <!-- Evento box -->
  <rect x="30" y="70" width="170" height="100" rx="8" fill="#252535" stroke="#f9e2af" stroke-width="2"/>
  <text x="115" y="94" fill="#f9e2af" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">EVENTO</text>
  <text x="115" y="116" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" text-anchor="middle">BufWritePre</text>
  <text x="115" y="134" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" text-anchor="middle">*.lua</text>
  <text x="115" y="156" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">algo ocurre en Vim</text>

  <!-- Autocmd box -->
  <rect x="235" y="70" width="170" height="100" rx="8" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="320" y="94" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">AUTOCMD</text>
  <text x="320" y="116" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5" text-anchor="middle">nvim_create_autocmd</text>
  <text x="320" y="134" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5" text-anchor="middle">pattern coincide</text>
  <text x="320" y="156" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">agrupado en un augroup</text>

  <!-- Callback box -->
  <rect x="440" y="70" width="170" height="100" rx="8" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="525" y="94" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">CALLBACK</text>
  <text x="525" y="116" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5" text-anchor="middle">function(args)</text>
  <text x="525" y="134" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5" text-anchor="middle">vim.lsp.buf.format()</text>
  <text x="525" y="156" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">se ejecuta automáticamente</text>

  <!-- arrows -->
  <line x1="200" y1="120" x2="233" y2="120" stroke="#585b70" stroke-width="1.5" marker-end="url(#ar1)"/>
  <line x1="405" y1="120" x2="438" y2="120" stroke="#585b70" stroke-width="1.5" marker-end="url(#ar1)"/>

  <text x="320" y="200" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Ejemplo: al guardar un .lua (evento) → formatear con LSP (callback)</text>
  <text x="320" y="219" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">group + clear = true evita duplicar autocmds al recargar la configuración</text>
</svg>
