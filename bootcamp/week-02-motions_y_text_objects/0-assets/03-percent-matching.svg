<svg xmlns="http://www.w3.org/2000/svg" width="640" height="280" viewBox="0 0 640 280">
  <rect width="640" height="280" fill="#1e1e2e"/>

  <text x="320" y="28" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">% — salto al delimitador correspondiente</text>

  <!-- Code block (6 lines, 30px each) -->
  <rect x="80" y="44" width="360" height="185" rx="6" fill="#181825" stroke="#313244" stroke-width="1"/>

  <!-- line 1: function foo(a, b) { -->
  <text x="100" y="68" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14">function foo</text>
  <text x="254" y="68" fill="#f9e2af" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14" font-weight="700">(</text>
  <text x="262" y="68" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14">a, b</text>
  <text x="294" y="68" fill="#f9e2af" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14" font-weight="700">)</text>
  <text x="302" y="68" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14"> </text>
  <text x="310" y="68" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14" font-weight="700">{</text>

  <text x="100" y="98" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14">  if </text>
  <text x="138" y="98" fill="#f38ba8" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14" font-weight="700">(</text>
  <text x="146" y="98" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14">a &gt; 0</text>
  <text x="196" y="98" fill="#f38ba8" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14" font-weight="700">)</text>
  <text x="204" y="98" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14"> {</text>

  <text x="100" y="128" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14">    return a</text>
  <text x="100" y="158" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14">  }</text>
  <text x="100" y="188" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14">  return b</text>
  <text x="100" y="218" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14" font-weight="700">}</text>

  <!-- % arrows for { } (outer) — blue -->
  <defs>
    <marker id="m-blue" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#89b4fa"/>
    </marker>
    <marker id="m-blue-rev" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <polygon points="8,0 0,4 8,8" fill="#89b4fa"/>
    </marker>
    <marker id="m-yellow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#f9e2af"/>
    </marker>
    <marker id="m-red" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#f38ba8"/>
    </marker>
  </defs>

  <!-- Outer { } blue arc on right -->
  <path d="M 480 60 C 540 60 540 210 480 210" fill="none" stroke="#89b4fa" stroke-width="2"/>
  <polygon points="472,60 484,54 484,66" fill="#89b4fa"/>
  <polygon points="472,210 484,204 484,216" fill="#89b4fa"/>
  <text x="545" y="120" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="18" font-weight="700">%</text>
  <text x="545" y="138" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">outer { }</text>

  <!-- Inner ( ) yellow arc on right -->
  <path d="M 480 90 C 520 90 520 100 480 100" fill="none" stroke="#f9e2af" stroke-width="2"/>
  <polygon points="472,90 484,84 484,96" fill="#f9e2af"/>
  <polygon points="472,100 484,94 484,106" fill="#f9e2af"/>
  <text x="528" y="98" fill="#f9e2af" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">( )</text>

  <!-- Inner if ( ) red arc on right -->
  <path d="M 140 90 C 108 90 108 100 140 100" fill="none" stroke="#f38ba8" stroke-width="2"/>
  <text x="70" y="98" fill="#f38ba8" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">if ( )</text>

  <!-- Bottom rule -->
  <line x1="30" y1="248" x2="610" y2="248" stroke="#313244" stroke-width="1"/>
  <text x="30" y="263" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">%  en { → salta a }  ·  en ( → salta a )  ·  en [ → salta a ]</text>
  <text x="30" y="276" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">funciona multilínea  ·  d% = delete hasta par  ·  c% = change hasta par</text>
</svg>
