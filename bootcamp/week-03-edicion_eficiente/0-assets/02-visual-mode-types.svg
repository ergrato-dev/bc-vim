<svg xmlns="http://www.w3.org/2000/svg" width="640" height="260" viewBox="0 0 640 260">
  <rect width="640" height="260" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">v / V / Ctrl-v — qué selecciona cada Visual mode</text>

  <!-- v: character -->
  <rect x="15" y="40" width="610" height="60" rx="5" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="30" y="63" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700">v</text>
  <text x="30" y="86" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14">const <tspan fill="#89b4fa" font-weight="700">us</tspan>er = "ana";</text>
  <rect x="90" y="72" width="17" height="18" fill="#89b4fa" opacity="0.3" rx="2"/>
  <text x="605" y="86" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="end">carácter a carácter</text>

  <!-- V: line -->
  <rect x="15" y="106" width="610" height="66" rx="5" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="30" y="128" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700">V</text>
  <rect x="72" y="118" width="470" height="18" fill="#a6e3a1" opacity="0.2" rx="2"/>
  <text x="75" y="132" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14">const active = true;</text>
  <rect x="72" y="140" width="470" height="18" fill="#a6e3a1" opacity="0.2" rx="2"/>
  <text x="75" y="154" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14">const role = "admin";</text>
  <text x="605" y="132" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="end">línea completa</text>

  <!-- Ctrl-v: block -->
  <rect x="15" y="178" width="610" height="66" rx="5" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="30" y="200" fill="#cba6f7" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700">Ctrl-v</text>
  <text x="105" y="204" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14">nombre<tspan fill="#585b70">    :</tspan>  Ana</text>
  <text x="105" y="226" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14">edad  <tspan fill="#585b70">    :</tspan>  30</text>
  <rect x="150" y="192" width="9" height="42" fill="#cba6f7" opacity="0.3"/>
  <text x="605" y="204" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="end">bloque rectangular</text>
  <text x="605" y="226" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="end">(misma columna, varias líneas)</text>

  <text x="320" y="256" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">en los 3 modos: d/c/y/&gt;/&lt;/gu/gU operan sobre la selección</text>
</svg>
