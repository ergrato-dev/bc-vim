<svg xmlns="http://www.w3.org/2000/svg" width="640" height="230" viewBox="0 0 640 230">
  <rect width="640" height="230" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Anatomía de nvim_create_user_command()</text>

  <!-- code line -->
  <rect x="30" y="46" width="580" height="46" rx="6" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="320" y="75" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" text-anchor="middle">nvim_create_user_command( <tspan fill="#f9e2af">"Reload"</tspan>, <tspan fill="#89b4fa">callback</tspan>, <tspan fill="#a6e3a1">{ opts }</tspan> )</text>

  <!-- Nombre box -->
  <rect x="40" y="112" width="170" height="94" rx="8" fill="#252535" stroke="#f9e2af" stroke-width="2"/>
  <text x="125" y="134" fill="#f9e2af" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">NOMBRE</text>
  <text x="125" y="156" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" text-anchor="middle">:Reload</text>
  <text x="125" y="178" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">debe empezar en mayúscula</text>
  <line x1="125" y1="92" x2="125" y2="110" stroke="#f9e2af" stroke-width="1.5"/>

  <!-- Callback box -->
  <rect x="235" y="112" width="170" height="94" rx="8" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="320" y="134" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">CALLBACK</text>
  <text x="320" y="156" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" text-anchor="middle">function(opts)</text>
  <text x="320" y="178" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">recibe args, line1, line2...</text>
  <line x1="320" y1="92" x2="320" y2="110" stroke="#89b4fa" stroke-width="1.5"/>

  <!-- Opciones box -->
  <rect x="430" y="112" width="170" height="94" rx="8" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="515" y="134" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">OPCIONES</text>
  <text x="515" y="156" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5" text-anchor="middle">nargs, range,</text>
  <text x="515" y="172" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10.5" text-anchor="middle">complete, desc</text>
  <line x1="515" y1="92" x2="515" y2="110" stroke="#a6e3a1" stroke-width="1.5"/>

  <text x="320" y="222" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Un comando de usuario es tan flexible como sus opciones: nargs, range y complete lo acercan a los nativos</text>
</svg>
