<svg xmlns="http://www.w3.org/2000/svg" width="640" height="250" viewBox="0 0 640 250">
  <rect width="640" height="250" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">"0 protege tu último yank — "" se sobrescribe con cada delete</text>

  <!-- Step 1: yiw -->
  <rect x="15" y="46" width="185" height="150" rx="6" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="107" y="66" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700" text-anchor="middle">yiw</text>
  <text x="107" y="84" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">copia "usuario"</text>

  <rect x="30" y="96" width="155" height="26" rx="3" fill="#252535" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="107" y="113" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" text-anchor="middle">"" = usuario</text>

  <rect x="30" y="130" width="155" height="26" rx="3" fill="#252535" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="107" y="147" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" text-anchor="middle">"0 = usuario</text>

  <text x="107" y="180" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">yank escribe en</text>
  <text x="107" y="192" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">AMBOS registros</text>

  <!-- arrow 1 -->
  <line x1="200" y1="120" x2="228" y2="120" stroke="#585b70" stroke-width="1.5"/>
  <polygon points="228,115 236,120 228,125" fill="#585b70"/>

  <!-- Step 2: diw -->
  <rect x="237" y="46" width="185" height="150" rx="6" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="329" y="66" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700" text-anchor="middle">diw</text>
  <text x="329" y="84" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">elimina "nombre"</text>

  <rect x="252" y="96" width="155" height="26" rx="3" fill="#252535" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="329" y="113" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" text-anchor="middle">"" = nombre</text>

  <rect x="252" y="130" width="155" height="26" rx="3" fill="#252535" stroke="#a6e3a1" stroke-width="2.5"/>
  <text x="329" y="147" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" font-weight="700" text-anchor="middle">"0 = usuario</text>

  <text x="329" y="180" fill="#f9e2af" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">"" se sobrescribe,</text>
  <text x="329" y="192" fill="#f9e2af" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">"0 queda INTACTO</text>

  <!-- arrow 2 -->
  <line x1="422" y1="120" x2="450" y2="120" stroke="#585b70" stroke-width="1.5"/>
  <polygon points="450,115 458,120 450,125" fill="#585b70"/>

  <!-- Step 3: paste -->
  <rect x="459" y="46" width="166" height="150" rx="6" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="542" y="66" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700" text-anchor="middle">p vs "0p</text>

  <text x="474" y="90" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">p     → nombre</text>
  <text x="474" y="108" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5">(lo eliminado)</text>

  <text x="474" y="138" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11">"0p   → usuario</text>
  <text x="474" y="156" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5">(lo copiado antes)</text>

  <text x="542" y="182" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="middle">sin "0 se pierde</text>
  <text x="542" y="192" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="middle">la copia original</text>

  <text x="320" y="222" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Regla: y escribe en "" y "0 · d/x/c solo escriben en "" (nunca en "0)</text>
</svg>
