<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <defs>
    <marker id="mg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#a6e3a1"/>
    </marker>
    <marker id="mb" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#89b4fa"/>
    </marker>
    <marker id="mp" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#cba6f7"/>
    </marker>
  </defs>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Ciclo de una macro: grabar → ejecutar → repetir</text>

  <!-- Grabar box -->
  <rect x="30" y="70" width="160" height="90" rx="8" fill="#252535" stroke="#f9e2af" stroke-width="2"/>
  <text x="110" y="100" fill="#f9e2af" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14" font-weight="700" text-anchor="middle">q a</text>
  <text x="110" y="120" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">graba comandos</text>
  <text x="110" y="136" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">... q para detener</text>

  <!-- Ejecutar box -->
  <rect x="240" y="70" width="160" height="90" rx="8" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="320" y="100" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14" font-weight="700" text-anchor="middle">@ a</text>
  <text x="320" y="120" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">ejecuta la macro</text>
  <text x="320" y="136" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">reproduce registro 'a'</text>

  <!-- Repetir box -->
  <rect x="450" y="70" width="160" height="90" rx="8" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="530" y="100" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="14" font-weight="700" text-anchor="middle">@ @</text>
  <text x="530" y="120" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">repite la última</text>
  <text x="530" y="136" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">5@@ → 5 veces más</text>

  <!-- arrows forward -->
  <line x1="190" y1="115" x2="238" y2="115" stroke="#585b70" stroke-width="1.5" marker-end="url(#mb)"/>
  <line x1="400" y1="115" x2="448" y2="115" stroke="#585b70" stroke-width="1.5" marker-end="url(#mg)"/>

  <!-- loop arrow back from Repetir to itself -->
  <path d="M 610 100 C 650 60, 650 170, 610 130" fill="none" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#mp)"/>
  <text x="614" y="60" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="start">N@@</text>

  <text x="320" y="195" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Regla de oro: toda macro empieza con posicionamiento predecible (0, ^, gg, /patrón)</text>
  <text x="320" y="214" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">:normal @a ejecuta como comando Normal · :%normal @a lo aplica a TODO el archivo</text>
</svg>
