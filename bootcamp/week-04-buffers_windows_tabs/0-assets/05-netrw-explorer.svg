<svg xmlns="http://www.w3.org/2000/svg" width="640" height="250" viewBox="0 0 640 250">
  <rect width="640" height="250" fill="#1e1e2e"/>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">:Explore — netrw como panel de archivos dentro de Vim</text>

  <!-- netrw panel -->
  <rect x="20" y="44" width="230" height="176" rx="6" fill="#181825" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="135" y="64" fill="#89b4fa" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">netrw — ~/proyecto/</text>

  <text x="35" y="86" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">../</text>
  <text x="35" y="106" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">src/</text>
  <rect x="30" y="115" width="210" height="20" fill="#f9e2af" opacity="0.15" rx="2"/>
  <text x="35" y="130" fill="#f9e2af" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700">tests/  ← cursor</text>
  <text x="35" y="150" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">main.lua</text>
  <text x="35" y="170" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12">README.md</text>

  <!-- keys -->
  <rect x="270" y="44" width="350" height="176" rx="6" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="290" y="66" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700">Enter</text>
  <text x="360" y="66" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">abre archivo o entra a directorio</text>

  <text x="290" y="90" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700">-</text>
  <text x="360" y="90" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">sube al directorio padre</text>

  <text x="290" y="114" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700">%</text>
  <text x="360" y="114" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">crea un archivo nuevo</text>

  <text x="290" y="138" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700">d</text>
  <text x="360" y="138" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">crea un directorio nuevo</text>

  <text x="290" y="162" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700">R</text>
  <text x="360" y="162" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">renombra el archivo bajo el cursor</text>

  <text x="290" y="186" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700">D</text>
  <text x="360" y="186" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">elimina el archivo bajo el cursor</text>

  <text x="320" y="240" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">incluido por defecto desde 1998 — cero plugins necesarios</text>
</svg>
