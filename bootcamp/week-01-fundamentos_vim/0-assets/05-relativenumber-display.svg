<svg xmlns="http://www.w3.org/2000/svg" width="430" height="298" viewBox="0 0 430 298">
  <rect width="430" height="298" fill="#1e1e2e"/>

  <text x="215" y="36" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="15" font-weight="600" text-anchor="middle">number + relativenumber</text>

  <rect x="15" y="50" width="400" height="210" rx="6" fill="#181825" stroke="#313244" stroke-width="1"/>
  <rect x="15" y="50" width="52" height="210" rx="6" fill="#1a1a2c"/>
  <line x1="67" y1="50" x2="67" y2="260" stroke="#313244" stroke-width="1"/>

  <!-- Cursor line highlight -->
  <rect x="15" y="169" width="400" height="30" fill="#252540"/>

  <!-- Line numbers -->
  <text x="61" y="70"  fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" text-anchor="end">3</text>
  <text x="61" y="100" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" text-anchor="end">2</text>
  <text x="61" y="130" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" text-anchor="end">1</text>
  <text x="61" y="160" fill="#f9e2af" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" font-weight="700" text-anchor="end">42</text>
  <text x="61" y="190" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" text-anchor="end">1</text>
  <text x="61" y="220" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" text-anchor="end">2</text>
  <text x="61" y="250" fill="#585b70" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13" text-anchor="end">3</text>

  <!-- Code content (single color per line, no split) -->
  <text x="78" y="70"  fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">def greet():</text>
  <text x="78" y="100" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">    name = "Alice"</text>
  <text x="78" y="130" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">    return name</text>

  <!-- Cursor block on line 4 -->
  <rect x="78" y="144" width="9" height="18" fill="#cdd6f4" opacity="0.85"/>

  <text x="78" y="220" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">class User:</text>
  <text x="78" y="250" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="13">    pass</text>

  <!-- Legend -->
  <rect x="15" y="268" width="12" height="12" rx="2" fill="#f9e2af"/>
  <text x="32" y="279" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">línea actual (número absoluto)</text>
  <rect x="220" y="268" width="12" height="12" rx="2" fill="#585b70"/>
  <text x="237" y="279" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11">otras líneas (relativo)</text>
</svg>
