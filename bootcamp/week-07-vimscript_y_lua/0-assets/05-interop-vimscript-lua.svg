<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <defs>
    <marker id="mp5" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f38ba8"/>
    </marker>
    <marker id="mg5" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#a6e3a1"/>
    </marker>
  </defs>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Interoperar Vimscript ↔ Lua: dos direcciones</text>

  <!-- Vimscript box -->
  <rect x="40" y="60" width="180" height="120" rx="8" fill="#252535" stroke="#f38ba8" stroke-width="2"/>
  <text x="130" y="86" fill="#f38ba8" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">VIMSCRIPT</text>
  <text x="130" y="112" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" text-anchor="middle">:lua print(1)</text>
  <text x="130" y="132" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" text-anchor="middle">lua &lt;&lt; EOF ... EOF</text>
  <text x="130" y="160" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">plugins legacy, dotfiles,</text>
  <text x="130" y="174" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">comandos Ex clásicos</text>

  <!-- Lua box -->
  <rect x="420" y="60" width="180" height="120" rx="8" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="510" y="86" fill="#a6e3a1" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">LUA</text>
  <text x="510" y="112" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" text-anchor="middle">vim.cmd("...")</text>
  <text x="510" y="132" fill="#cdd6f4" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="11" text-anchor="middle">vim.fn.expand(...)</text>
  <text x="510" y="160" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">configuración moderna,</text>
  <text x="510" y="174" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">plugins nuevos</text>

  <!-- arrows bidirectional -->
  <line x1="222" y1="100" x2="418" y2="100" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#mg5)"/>
  <text x="320" y="94" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10" text-anchor="middle">vim.cmd / vim.fn</text>

  <line x1="418" y1="145" x2="222" y2="145" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#mp5)"/>
  <text x="320" y="160" fill="#f38ba8" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10" text-anchor="middle">:lua / lua &lt;&lt; EOF</text>

  <text x="320" y="212" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">Ningún lenguaje reemplaza al otro por completo: se llaman mutuamente cuando conviene</text>
</svg>
