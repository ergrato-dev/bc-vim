<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <rect width="640" height="240" fill="#1e1e2e"/>

  <defs>
    <marker id="dm" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#585b70"/>
    </marker>
  </defs>

  <text x="320" y="26" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Flujo de debugging con nvim-dap</text>

  <!-- Step 1 -->
  <rect x="20" y="60" width="140" height="90" rx="8" fill="#252535" stroke="#f9e2af" stroke-width="2"/>
  <text x="90" y="88" fill="#f9e2af" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700" text-anchor="middle">&lt;leader&gt;db</text>
  <text x="90" y="108" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">breakpoint</text>
  <text x="90" y="126" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="middle">marca la línea</text>

  <!-- Step 2 -->
  <rect x="175" y="60" width="140" height="90" rx="8" fill="#252535" stroke="#89b4fa" stroke-width="2"/>
  <text x="245" y="88" fill="#89b4fa" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700" text-anchor="middle">&lt;leader&gt;dc</text>
  <text x="245" y="108" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">continue / start</text>
  <text x="245" y="126" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="middle">se abre DAP UI</text>

  <!-- Step 3 -->
  <rect x="330" y="60" width="140" height="90" rx="8" fill="#252535" stroke="#cba6f7" stroke-width="2"/>
  <text x="400" y="82" fill="#cba6f7" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="10" font-weight="700" text-anchor="middle">&lt;leader&gt;do/di/dO</text>
  <text x="400" y="102" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" text-anchor="middle">step over/into/out</text>
  <text x="400" y="120" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="middle">pausado en el</text>
  <text x="400" y="134" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="middle">breakpoint</text>

  <!-- Step 4 -->
  <rect x="485" y="60" width="140" height="90" rx="8" fill="#252535" stroke="#a6e3a1" stroke-width="2"/>
  <text x="555" y="88" fill="#a6e3a1" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="700" text-anchor="middle">DAP UI</text>
  <text x="555" y="108" fill="#cdd6f4" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">inspeccionar</text>
  <text x="555" y="126" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" text-anchor="middle">variables · stack · watch</text>

  <!-- arrows -->
  <line x1="160" y1="105" x2="173" y2="105" stroke="#585b70" stroke-width="1.5" marker-end="url(#dm)"/>
  <line x1="315" y1="105" x2="328" y2="105" stroke="#585b70" stroke-width="1.5" marker-end="url(#dm)"/>
  <line x1="470" y1="105" x2="483" y2="105" stroke="#585b70" stroke-width="1.5" marker-end="url(#dm)"/>

  <text x="320" y="185" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10.5" text-anchor="middle">&lt;leader&gt;de evalúa la expresión bajo el cursor · &lt;leader&gt;dc continúa hasta el siguiente breakpoint</text>
  <text x="320" y="230" fill="#585b70" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" text-anchor="middle">DAP es el equivalente de LSP pero para depurar: un adaptador (debugpy, codelldb) habla con Neovim</text>
</svg>
